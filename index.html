<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/ico" href="favicon.ico">
    <script src="js/main.js"></script>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/animate.css">
    <title>goon.github.io</title>
</head>
<body onload="goon()">
    <main>
        <header>
            <section id="date-time">
                <h2 class="sr-only">Date &amp; Time</h2>
            </section>
            <section id="weather">
                <h2 class="sr-only">Location &amp; Weather</h2>
            </section>
        </header>
        <section id="goon">
            <h1 class="sr-only">goon.github.io</h1>
            <aside>
                <img src="logo.png" class="animated pulse infinite" alt="logo">
            </aside>
            
            <section id="search">
                <h2 class="sr-only">Search</h2>
                <form action="https://duckduckgo.com/" method="get">
                    <input type="text" id="q" name="q" autofocus>
                    <button class="sr-only" tabindex="-1">Search</button>
                </form>
            </section>
            <section id="bookmarks">
                <h2 class="sr-only">Bookmarks</h2>
                <ul>
                    <li>
                        <a href="https://www.reddit.com"><img src="https://icons.duckduckgo.com/ip3/protonmail.com.ico" class="favicon" alt="Protonmail favicon">protonmail</a>
                    </li>
                    <li>
                        <a href="https://vault.bitwarden.com/"><img src="https://icons.duckduckgo.com/ip3/vault.bitwarden.com.ico" class="favicon" alt="Bitwarden favicon">bitwarden</a>
                    </li>
                </ul>
                <ul>
                    <li>
                        <a href="https://reddit.com"><img src="https://icons.duckduckgo.com/ip3/reddit.com.ico" class="favicon" alt="Reddit favicon">reddit</a>
                    </li>
                    <li>
                        <a href="https://www.youtube.com"><img src="https://icons.duckduckgo.com/ip3/youtube.com.ico" class="favicon" alt="YouTube favicon">youtube</a>
                    </li>
                    <li>
                        <a href="https://www.twitter.com"><img src="https://icons.duckduckgo.com/ip3/twitter.com.ico" class="favicon" alt="Twitter favicon">twitter</a>
                    </li>
                    <li>
                        <a href="https://www.twitch.tv"><img src="https://icons.duckduckgo.com/ip3/twitch.tv.ico" class="favicon" alt="Twitch favicon">twitch</a>
                    </li>
                </ul>
                <ul>
                    <li>
                        <a href="https://github.com/goon"><img src="https://icons.duckduckgo.com/ip3/github.com.ico" class="favicon" alt="GitHub favicon">github</a>
                    </li>
                    <li>
                        <a href="https://steamcommunity.com/id/tsruhyah/"><img src="https://icons.duckduckgo.com/ip3/steamcommunity.com.ico" class="favicon" alt="Steam favicon">steam</a>
                    </li>
                    <li>
                        <a href="https://www.nexusmods.com/"><img src="https://icons.duckduckgo.com/ip3/nexusmods.com.ico" class="favicon" alt="Nexus favicon">nexus</a>
                    </li>
                    <li>
                        <a href="https://mod.io"><img src="https://icons.duckduckgo.com/ip3/mod.io.ico" class="favicon" alt="mod.io favicon">mod.io</a>
                    </li>
                </ul>
                <ul>
                    <li>
                        <a href="https://www.reddit.com/r/2007scape/"><img src="https://icons.duckduckgo.com/ip3/reddit.com.ico" class="favicon" alt="2007Scape favicon">r/2007scape</a>
                    </li>
                    <li>
                        <a href="https://www.reddit.com/r/pcmasterrace/"><img src="https://icons.duckduckgo.com/ip3/reddit.com.ico" class="favicon" alt="pcmr favicon">r/pcmasterrace</a>
                    </li>
                </ul>
            </section>
        </section>
    </main>
</body>
</html>
